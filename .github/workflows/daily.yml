name: Daily Content Pipeline

on:
  schedule:
    # GitHub's scheduler is best-effort (delays/drops runs), so we fire FIVE times
    # across the morning. An idempotency guard (run_state.json) means the work runs
    # only ONCE per day — the rest are silent safety nets. All times are the SAME
    # UTC day (hours 0-9) so the "prepare tomorrow's post" logic stays consistent.
    # Minute :17 avoids GitHub's top-of-hour peak load. PKT = UTC+5.
    - cron: '17 0 * * *'    # 05:17 AM PKT — primary (post ready before you wake)
    - cron: '17 2 * * *'    # 07:17 AM PKT — backup 1
    - cron: '17 4 * * *'    # 09:17 AM PKT — backup 2
    - cron: '17 6 * * *'    # 11:17 AM PKT — backup 3
    - cron: '17 9 * * *'    # 02:17 PM PKT — final catch-up
  workflow_dispatch:        # lets you run it manually from the Actions tab too

permissions:
  contents: write           # allow the workflow to commit results back

jobs:
  run-pipeline:
    runs-on: ubuntu-latest
    steps:
      - name: Checkout repo
        uses: actions/checkout@v4

      - name: Set up Python
        uses: actions/setup-python@v5
        with:
          python-version: '3.12'

      - name: Install dependencies
        run: pip install -r requirements.txt

      # ---- Dashboard 1: Anas Content HQ (fitness) ----
      - name: Run YouTube module (fitness)
        continue-on-error: true
        env:
          YOUTUBE_API_KEY: ${{ secrets.YOUTUBE_API_KEY }}
        run: python youtube_module.py

      - name: Run the brain (fitness)
        continue-on-error: true
        env:
          GEMINI_API_KEY: ${{ secrets.GEMINI_API_KEY }}
        run: python brain.py

      # ---- Dashboard 2: Anas Copy Lab / Instagram Grid Manager ----
      - name: Run Copy Lab module (YouTube research)
        continue-on-error: true
        env:
          YOUTUBE_API_KEY: ${{ secrets.YOUTUBE_API_KEY }}
        run: python copy_module.py

      - name: Run Instagram module (Apify research)
        continue-on-error: true
        env:
          APIFY_API_TOKEN: ${{ secrets.APIFY_API_TOKEN }}
        run: python instagram_module.py

      - name: Run Copy Lab brain (merge YouTube + Instagram)
        continue-on-error: true
        env:
          GEMINI_API_KEY: ${{ secrets.GEMINI_API_KEY }}
        run: python copy_brain.py

      # ---- Dashboard 3: Anas Jobs Radar (free job boards, no YouTube quota) ----
      - name: Run Jobs module
        continue-on-error: true
        run: python jobs_module.py

      - name: Run Jobs brain
        continue-on-error: true
        env:
          GEMINI_API_KEY: ${{ secrets.GEMINI_API_KEY }}
        run: python jobs_brain.py

      - name: Commit updated briefs
        run: |
          git config user.name "content-bot"
          git config user.email "bot@users.noreply.github.com"
          git add run_state.json \
                  youtube_outliers.json content_pack.json hook_bank.json seen_videos.json \
                  copy_outliers.json copy_pack.json copy_hook_bank.json copy_seen.json \
                  instagram_outliers.json instagram_hook_bank.json instagram_seen.json \
                  jobs_raw.json jobs_pack.json jobs_seen.json history/
          git commit -m "Daily briefs: $(date -u +'%Y-%m-%d')" || echo "No changes to commit"
          git pull --rebase origin main || true
          git push
