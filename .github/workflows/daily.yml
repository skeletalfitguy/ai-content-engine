name: Daily Content Pipeline

on:
  schedule:
    # 04:00 UTC = 09:00 AM Pakistan time (PKT, UTC+5)
    - cron: '0 4 * * *'
  workflow_dispatch:        # lets you run it manually from the Actions tab too

permissions:
  contents: write           # allow the workflow to commit results back

jobs:
  run-pipeline:
    runs-on: ubuntu-latest
    steps:
      - name: Checkout repo
        uses: actions/checkout@v4

      - name: Set up Python
        uses: actions/setup-python@v5
        with:
          python-version: '3.12'

      - name: Install dependencies
        run: pip install -r requirements.txt

      - name: Run YouTube module
        env:
          YOUTUBE_API_KEY: ${{ secrets.YOUTUBE_API_KEY }}
        run: python youtube_module.py

      - name: Run the brain (Gemini)
        env:
          GEMINI_API_KEY: ${{ secrets.GEMINI_API_KEY }}
        run: python brain.py

      - name: Commit updated brief
        run: |
          git config user.name "content-bot"
          git config user.email "bot@users.noreply.github.com"
          git add youtube_outliers.json content_pack.json hook_bank.json seen_videos.json
          git commit -m "Daily brief: $(date -u +'%Y-%m-%d')" || echo "No changes to commit"
          git push
